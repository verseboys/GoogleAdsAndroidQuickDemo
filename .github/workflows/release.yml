# 发布 CD - 打 tag 自动发布到 GitHub Releases
name: Release

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0, v2.1.3 等

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限创建 Release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK (Signed)
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "Signing with keystore..."
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          rm app/release.keystore
        else
          echo "No keystore configured, building unsigned release..."
          ./gradlew assembleRelease
        fi

    - name: Rename APKs
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk \
           app/build/outputs/apk/debug/GoogleAdsDemo-${{ steps.version.outputs.VERSION }}-debug.apk
        mv app/build/outputs/apk/release/app-release*.apk \
           app/build/outputs/apk/release/GoogleAdsDemo-${{ steps.version.outputs.VERSION }}-release.apk || true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release v${{ steps.version.outputs.VERSION }}
        body: |
          ## 📱 Google Ads Demo v${{ steps.version.outputs.VERSION }}
          
          ### 下载
          - **debug.apk** - 调试版本，可直接安装
          - **release.apk** - 发布版本
          
          ### 广告类型
          - ✅ Banner 横幅广告
          - ✅ Interstitial 插屏广告
          - ✅ Rewarded 激励视频
          
          > ⚠️ 使用 Google 官方测试广告 ID
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
